<html>
    <head>
        <title>Student Mental Health Rating App - Main Page</title>
    </head>
    <body>
        <!-- Header -->
        <header id = "app_name" style = "text-align: left;">
            <h1>Game Discovery Web</h1>
        </header>

        <!-- Nav Placement -->
        <hr id = "line">
        <br>

        <!-- Main User Input Area -->
        <div class = "main_content">

            <!-- Log in Area -->
            <form> 
                <h3>Enter Username</h3>
                <input type = "email" id = "username">
                <h3>Enter Password</h3>
                <input type = "password" id = "user_password">
            </form>

            <!-- Habat data form-->
            <section>
                <form id = "health_input_form">
                    <h2>Sleep Hours Input</h2>
                    <input type = "text" id = "userSleep">
                    <h2>Tv Hours Input</h2>
                    <input type = "text" id = "userTvHours">
                    <h2>Diet Quality Input</h2>
                    <input type = "text" id = "userDiet">
                    <h2>Exercise Frequency Weekly Input</h2>
                    <input type = "text" id = "userExercise">
                    <h2>Daily Study Hours Input</h2>
                    <input type = "text" id = "userStudy">
                    <h2>Social Media Hours Input</h2>
                    <input type = "text" id = "userSocialMedia">
                    <br><br>

                    <button role = "button" id = "submit_button">Calculate Mental Health Score!</button>
                </form>

                <div id = "modelRating">Placeholder</div>
            </section>
        </div>

        <script src = "main_page.js"></script>
    </body>
</html>
